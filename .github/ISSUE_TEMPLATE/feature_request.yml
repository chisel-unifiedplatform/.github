name: ✨ Feature request
description: Suggest an idea or improvement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Please describe the problem and the outcome you want.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point. What are you unable to do today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you've thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — mockups, links, examples.
    validations:
      required: false
