name: 🐛 Bug report
description: Report something that isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections below so we
        can reproduce and fix it quickly.

        ⚠️ **Do not report security vulnerabilities here** — see our
        [Security Policy](https://github.com/chisel-unifiedplatform/.github/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, browser/OS, tenant, or deployment details where relevant.
      placeholder: |
        - Repo / service:
        - Version / commit:
        - Environment (prod/staging/local):
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any logs, error messages, or screenshots. Redact secrets.
      render: shell
    validations:
      required: false
